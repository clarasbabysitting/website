<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account — Clara's Babysitting</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌿</text></svg>">
</head>
<body>

  <nav class="nav scrolled" style="position:relative">
    <div class="container nav-inner">
      <a href="index.html" class="nav-logo">
        <div class="nav-logo-icon">🌿</div>
        Clara's
      </a>
      <a href="login.html" class="btn btn-outline btn-sm">Log In</a>
    </div>
  </nav>

  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="auth-logo-icon">🌿</div>
        <span class="auth-logo-name">Clara's Babysitting</span>
      </div>

      <h1 class="auth-title">Create your account</h1>
      <p class="auth-sub">Join hundreds of families who trust Clara's for reliable childcare.</p>

      <div class="alert" id="signup-alert"></div>

      <!-- Trust badges -->
      <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:24px;">
        <span style="font-size:.78rem;color:var(--muted);display:flex;align-items:center;gap:4px">🔒 Secure sign-up</span>
        <span style="font-size:.78rem;color:var(--muted);display:flex;align-items:center;gap:4px">✅ Free account</span>
        <span style="font-size:.78rem;color:var(--muted);display:flex;align-items:center;gap:4px">📅 Book instantly</span>
      </div>

      <form id="signup-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="signup-name">Full Name</label>
          <input type="text" id="signup-name" class="form-input"
            placeholder="Jane Smith" autocomplete="name" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="signup-email">Email Address</label>
          <input type="email" id="signup-email" class="form-input"
            placeholder="you@example.com" autocomplete="email" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="signup-password">Password</label>
          <input type="password" id="signup-password" class="form-input"
            placeholder="Minimum 6 characters" autocomplete="new-password" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="signup-confirm">Confirm Password</label>
          <input type="password" id="signup-confirm" class="form-input"
            placeholder="Repeat your password" autocomplete="new-password" required>
        </div>
        <button type="submit" id="signup-btn" class="btn btn-primary form-submit btn-lg">
          Create Account →
        </button>
      </form>

      <p class="form-link">Already have an account? <a href="login.html">Log in</a></p>
      <p class="form-link"><a href="index.html">← Back to home</a></p>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase.js"></script>
  <script src="js/auth.js"></script>
  <script>
    Auth.redirectIfLoggedIn('dashboard.html');
    Auth.initSignup();
  </script>
</body>
</html>
