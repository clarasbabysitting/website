<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log In — Clara's Babysitting</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌿</text></svg>">
</head>
<body>

  <!-- Simple nav -->
  <nav class="nav scrolled" style="position:relative">
    <div class="container nav-inner">
      <a href="index.html" class="nav-logo">
        <div class="nav-logo-icon">🌿</div>
        Clara's
      </a>
      <a href="signup.html" class="btn btn-primary btn-sm">Create Account</a>
    </div>
  </nav>

  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="auth-logo-icon">🌿</div>
        <span class="auth-logo-name">Clara's Babysitting</span>
      </div>

      <h1 class="auth-title">Welcome back</h1>
      <p class="auth-sub">Log in to manage your bookings and schedule.</p>

      <div class="alert" id="login-alert"></div>

      <form id="login-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="login-email">Email Address</label>
          <input type="email" id="login-email" class="form-input"
            placeholder="you@example.com" autocomplete="email" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="login-password">Password</label>
          <input type="password" id="login-password" class="form-input"
            placeholder="••••••••" autocomplete="current-password" required>
        </div>
        <button type="submit" id="login-btn" class="btn btn-primary form-submit btn-lg">
          Log In →
        </button>
      </form>

      <p class="form-link">Don't have an account? <a href="signup.html">Sign up free</a></p>
      <p class="form-link"><a href="index.html">← Back to home</a></p>
    </div>
  </div>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase.js"></script>
  <script src="js/auth.js"></script>
  <script>
    Auth.redirectIfLoggedIn('dashboard.html');
    Auth.initLogin();
  </script>
</body>
</html>
